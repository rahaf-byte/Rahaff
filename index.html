<!DOCTYPE html>
<html lang="ar">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Our Special Day - Rahaf Edition</title>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body {
            background-color: #ffc0cb;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            font-family: 'Arial', sans-serif;
            overflow: hidden; 
            position: relative;
            padding: 20px;
        }

        #countdown {
            position: absolute;
            font-size: 4.5rem; /* مقاس متناسق مع الجوالات */
            color: #c2185b;
            font-weight: bold;
            z-index: 200;
            transition: opacity 0.5s;
            text-align: center;
            width: 100%;
        }

        .cake-container {
            display: flex;
            flex-direction: column;
            align-items: center;
            width: 100%;
            max-width: 280px;
            height: 280px;
            position: relative;
            z-index: 100;
            margin-top: -20px;
        }

        .candles-group {
            display: flex;
            gap: 15px;
            position: absolute;
            top: -100vh;
            opacity: 0;
            transition: top 0.6s cubic-bezier(0.175, 0.885, 0.32, 1.275), opacity 0.3s;
            z-index: 110;
        }

        .candle { width: 8px; height: 35px; background: #fff; position: relative; border-bottom: 2px solid #ddd; }
        .flame {
            width: 10px; height: 18px; background: #ffa500; border-radius: 50% 50% 35% 35%;
            position: absolute; top: -22px; left: -1px;
            box-shadow: 0 0 15px #ff0; animation: flicker 0.6s infinite alternate;
        }

        .smoke {
            position: absolute; top: -35px; left: 50%; transform: translateX(-50%);
            font-size: 1.2rem; opacity: 0; display: none; animation: smokeUp 1.5s forwards;
        }

        @keyframes smokeUp { 0% { transform: translate(-50%, 0); opacity: 0.8; } 100% { transform: translate(-50%, -40px); opacity: 0; } }
        @keyframes flicker { from { transform: scale(1); } to { transform: scale(1.1); } }

        .layer {
            background: #6d4c41; border-radius: 10px 10px 0 0; border-bottom: 4px solid #4e342e;
            position: absolute; top: -100vh; left: 50%; transform: translateX(-50%);
            transition: top 0.6s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        }
        .layer-bottom { width: 200px; height: 60px; z-index: 1; }
        .layer-middle { width: 150px; height: 50px; z-index: 2; }
        .layer-top    { width: 100px; height: 40px; z-index: 3; }
        .icing { width: 100%; height: 12px; background: #ffffff; border-radius: 50px; position: absolute; top: 0; }

        .Happy__Birthday {
            color: #c2185b; 
            font-size: 1.7rem; /* مقاس يمنع الكلمة تنزل سطر جديد بالجوال */
            margin: 15px 0;
            z-index: 100; 
            display: none; 
            text-align: center;
            width: 100%;
            max-width: 90%;
        }
        .Happy__Birthday::after {
            content: "Happy Birthday my Love!";
            display: inline-block; overflow: hidden; white-space: nowrap; width: 0;
            animation: typing 3.5s steps(25) forwards; border-right: 3px solid;
        }
        @keyframes typing { from { width: 0; } to { width: 100%; } }

        #btns { 
            opacity: 0; 
            margin-top: 15px; 
            transition: 1s; 
            z-index: 2000; 
            position: relative;
            height: 50px;
            width: 100%;
            max-width: 260px;
        }
        .btn { 
            position: absolute;
            left: 50%;
            transform: translateX(-50%);
            background-color: #c2185b; color: white; border: none; 
            padding: 12px 20px; border-radius: 30px; cursor: pointer; font-size: 1.1rem; 
            box-shadow: 0 4px 10px rgba(0,0,0,0.2);
            width: 100%;
            transition: 0.5s;
        }
        #memory-btn { visibility: hidden; opacity: 0; background-color: #ad1457; }

        /* تعديل المربعات الجانبية لتفتح بالمنتصف بشكل منبثق فخم ومتناسق مع الجوال */
        .scroll {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%) scale(0.7); /* تبدأ بالمنتصف ومصغرة */
            width: 90%; 
            max-width: 320px; 
            height: 75vh; 
            background: #fdf5e6;
            border: 2px solid #d2b48c;
            border-radius: 15px;
            padding: 20px; 
            box-shadow: 0 10px 30px rgba(0,0,0,0.3);
            z-index: 3000;
            transition: 0.5s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            overflow-y: auto;
            opacity: 0;
            pointer-events: none;
        }
        
        /* تفعيل الظهور والانتقال السلس في المنتصف عند الضغط للفتح */
        #scroll-left.active { 
            transform: translate(-50%, -50%) scale(1);
            opacity: 1;
            pointer-events: auto;
        }
        #scroll-right.active { 
            transform: translate(-50%, -50%) scale(1);
            opacity: 1;
            pointer-events: auto;
        }

        #scroll-right { border-color: #c2185b; }

        .letter-content { font-family: 'Courier New', serif; color: #5d4037; font-size: 16px; line-height: 1.6; text-align: right; white-space: pre-wrap; }
        .date-badge { display: block; text-align: center; color: #c2185b; font-weight: bold; font-size: 1.2rem; border-bottom: 2px dashed #d2b48c; margin-bottom: 15px; padding-bottom: 10px; }

        .particle { position: absolute; bottom: -50px; animation: riseUp linear infinite; z-index: 10; }
        @keyframes riseUp { 0% { transform: translateY(0); opacity: 0; } 10% { opacity: 1; } 100% { transform: translateY(-110vh); opacity: 0; } }
    </style>
</head>
<body>

    <div id="countdown">3</div>

    <div class="cake-container">
        <div class="candles-group" id="candles">
            <div class="candle"><div class="flame"></div><div class="smoke">☁️</div></div>
            <div class="candle"><div class="flame"></div><div class="smoke">☁️</div></div>
            <div class="candle"><div class="flame"></div><div class="smoke">☁️</div></div>
        </div>
        <div class="layer layer-bottom" id="l1"><div class="icing"></div></div>
        <div class="layer layer-middle" id="l2"><div class="icing"></div></div>
        <div class="layer layer-top" id="l3"><div class="icing"></div></div>
    </div>

    <h1 class="Happy__Birthday" id="wish"></h1>
    <div id="btns">
        <button class="btn" id="open-btn" onclick="openLetter()">📜 اضغط لفتح الرسالة</button>
        <button class="btn" id="memory-btn" onclick="openMemories()">✨ اضغط لرؤية تاريخنا</button>
    </div>

    <div id="scroll-left" class="scroll">
        <div class="letter-content" id="letter-text"></div>
    </div>

    <div id="scroll-right" class="scroll">
        <span class="date-badge">2026 - JAN - 28</span>
        <div class="letter-content" style="text-align: center;">
            تاريخنا..<br>
            يوم بدأت قصتنا الجميلة!<br>
            ✨❤️✨<br><br>
            (هنا تقدرين تزيدين أي كلام ثاني للذكرى لأن المربع صار يشيل أكثر!)
        </div>
    </div>

    <script>
        const countEl = document.getElementById('countdown');
        const l1 = document.getElementById('l1');
        const l2 = document.getElementById('l2');
        const l3 = document.getElementById('l3');
        const candles = document.getElementById('candles');
        const flames = document.querySelectorAll('.flame');
        const smokes = document.querySelectorAll('.smoke');
        const scrollLeft = document.getElementById('scroll-left');
        const scrollRight = document.getElementById('scroll-right');
        const letterTextEl = document.getElementById('letter-text');
        const openBtn = document.getElementById('open-btn');
        const memoryBtn = document.getElementById('memory-btn');
        const message = "عيد ميلاد سعيد 🎂✨\nأتمنى لك سنة جديدة مليانة خير وفرح ونجاح في كل جوانب حياتك.  لأنك شخص مهم بالنسبة لي والأيام اللي عرفتك فيها كانت مليانة لحظات حلوة وضحك ورسائل ومكالمات ما راح أنساها أبدًا.  وأيامنا مع بعض علمتني أشياء كثيرة عن الحب والاهتمام واللحظات الجميلة اللي ممكن يعيشها الإنسان مع شخص يهمه.\n\nأتمنى لك من قلبي كل السعادة والراحة، والله يكتب لك أيام كلها خير وبركة، ويحقق كل اللي تتمناه في حياتك. وأتمنى لك ذكريات حلوة وفرح حقيقي في كل خطوة تخطوها، والله يجعل كل أيامك مليانة ضحك وحب ونجاح\nمن: رهف";
        
        let timer = setInterval(() => {
            let c = parseInt(countEl.innerText);
            if (c > 1) {
                countEl.innerText = c - 1;
            } else if (c === 1) {
                countEl.innerText = "انفخ 🌬️"; /* إضافة إيموجي لطيف وجعلها تظهر بالكامل */
                clearInterval(timer);
                setTimeout(() => {
                    l1.style.top = "180px";
                    setTimeout(() => { l2.style.top = "140px"; }, 300);
                    setTimeout(() => {
                        l3.style.top = "105px";
                        candles.style.opacity = "1";
                        candles.style.top = "75px"; 
                        countEl.style.opacity = "0"; 
                        setTimeout(() => { countEl.style.display = "none"; }, 500);
                        setTimeout(blowOut, 1500);
                    }, 600);
                }, 1000);
            }
        }, 1000);

        function blowOut() {
            flames.forEach(f => f.style.display = "none");
            smokes.forEach(s => { s.style.display = "block"; s.style.opacity = "0.8"; });
            createParticles();
            document.getElementById('wish').style.display = "block";
            setTimeout(() => { document.getElementById('btns').style.opacity = "1"; }, 4500);
        }

        function openLetter() {
            scrollLeft.classList.add('active');
            let i = 0;
            letterTextEl.innerHTML = "";
            function typeWriter() {
                if (i < message.length) {
                    letterTextEl.innerHTML += message.charAt(i);
                    i++;
                    setTimeout(typeWriter, 50); /* تسريع خفيف ليتناسب مع تجربة الجوال */
                    scrollLeft.scrollTop = scrollLeft.scrollHeight;
                } else {
                    setTimeout(() => {
                        openBtn.style.opacity = "0";
                        setTimeout(() => {
                            openBtn.style.visibility = "hidden";
                            memoryBtn.style.visibility = "visible";
                            memoryBtn.style.opacity = "1";
                        }, 500);
                    }, 1000);
                }
            }
            typeWriter();
        }

        function openMemories() {
            scrollLeft.classList.remove('active'); /* إغلاق الرسالة السابقة لتصفية النظر */
            setTimeout(() => {
                scrollRight.classList.add('active'); /* فتح مربع تاريخنا بالمنتصف فخامة */
            }, 300);
        }

        function createParticles() {
            for (let i = 0; i < 90; i++) { /* تقليل طفيف لتفادي تعليق الجوالات */
                const p = document.createElement('div');
                p.className = 'particle';
                p.style.left = Math.random() * 100 + 'vw';
                p.style.fontSize = (Math.random() * 15 + 10) + 'px';
                p.innerHTML = ['❤️', '💖', '✨'][Math.floor(Math.random() * 3)];
                p.style.animation = `riseUp ${Math.random() * 2 + 3}s linear infinite`;
                document.body.appendChild(p);
            }
        }

        const style = document.createElement('style');
        style.innerHTML = `@keyframes riseUp { 0% { transform: translateY(0); opacity: 0; } 10% { opacity: 1; } 100% { transform: translateY(-110vh); opacity: 0; } }`;
        document.head.appendChild(style);
    </script>
</body>
</html>
